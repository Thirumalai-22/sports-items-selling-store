<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Sports Gearup</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C5CE7;
            --secondary: #a29bfe;
            --bg-color: #0f0c29;
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f5f6fa;
            --muted: #b2bec3;
            --danger: #ff7675;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 50px;
            text-align: center;
        }

        .nav-item {
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 12px;
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.02);
            border: 1px solid transparent;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--primary);
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
            border: 1px solid rgba(255,255,255,0.2);
            transform: translateX(5px);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 800;
        }

        .btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.5);
        }

        .btn-danger {
            background: linear-gradient(45deg, #d63031, #ff7675);
            box-shadow: 0 4px 15px rgba(214, 48, 49, 0.3);
            padding: 8px 15px;
            font-size: 14px;
        }

        /* Dashboard Grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .glass-card h2 {
            margin-top: 0;
            font-size: 20px;
            margin-bottom: 25px;
            color: var(--secondary);
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 14px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0,0,0,0.4);
            box-shadow: 0 0 0 2px rgba(108, 92, 231, 0.2);
        }

        /* Table */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        th {
            text-align: left;
            padding: 0 15px;
            color: var(--muted);
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        td:first-child {
            border-left: 1px solid var(--border);
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
        }

        td:last-child {
            border-right: 1px solid var(--border);
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        .product-img-cell {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Notifications */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #00b894;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">GEARUP ADMIN</div>
        <a href="#" class="nav-item active">Inventory</a>
        <a href="index.html" class="nav-item">View Store</a>
        <a href="#" class="nav-item" onclick="logoutAdmin()">Logout</a>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Product Management</h1>
            <button class="btn" onclick="document.getElementById('name').focus()">+ New Product</button>
        </div>

        <div class="grid">
            <!-- Add Item Form -->
            <div class="glass-card">
                <h2>Add New Item</h2>
                <form id="addProductForm" onsubmit="addProduct(event)">
                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" id="name" required placeholder="e.g. Nike Air Max">
                    </div>
                    <div class="form-group">
                        <label>Price (₹)</label>
                        <input type="text" id="price" required placeholder="e.g. 4,999">
                    </div>
                    <div class="form-group">
                        <label>Image URL / Path</label>
                        <input type="text" id="image_url" required placeholder="e.g. nike imgs/nike1.jpg">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="category">
                            <option value="Exclusive">Exclusive</option>
                            <option value="Shoes">Shoes</option>
                            <option value="Apparel">Apparel</option>
                            <option value="Accessories">Accessories</option>
                        </select>
                    </div>
                    <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Save Product</button>
                </form>
            </div>

            <!-- Items List -->
            <div class="glass-card">
                <h2>Inventory Status</h2>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Price</th>
                                <th>Category</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="productTableBody">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Product added successfully!</div>

    <script>
        // Check if admin is logged in (using existing localstorage from app.js)
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user || user.role !== 'admin') {
                alert('Access Denied. Admin privileges required.');
                window.location.href = 'login.html';
                return;
            }
            loadProducts();
        });

        async function loadProducts() {
            try {
                const res = await fetch('/api/products');
                const products = await res.json();
                const tbody = document.getElementById('productTableBody');
                tbody.innerHTML = '';
                
                products.forEach(p => {
                    tbody.innerHTML += `
                        <tr>
                            <td><img src="${p.image_url}" class="product-img-cell" onerror="this.src='https://via.placeholder.com/60/302b63/ffffff?text=No+Img'"></td>
                            <td style="font-weight:600">${p.name}</td>
                            <td style="color:#00d2ff">₹${p.price}</td>
                            <td><span style="background:rgba(255,255,255,0.1);padding:4px 10px;border-radius:20px;font-size:12px;">${p.category}</span></td>
                            <td><button class="btn btn-danger" onclick="deleteProduct(${p.id})">Delete</button></td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error("Error loading products:", err);
            }
        }

        async function addProduct(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = 'Saving...';

            const payload = {
                name: document.getElementById('name').value,
                price: document.getElementById('price').value,
                image_url: document.getElementById('image_url').value,
                category: document.getElementById('category').value
            };

            try {
                const res = await fetch('/api/products', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    showToast('Product added successfully!');
                    e.target.reset();
                    loadProducts();
                }
            } catch (err) {
                console.error("Failed to add:", err);
                showToast('Failed to add product', true);
            } finally {
                btn.innerText = originalText;
            }
        }

        async function deleteProduct(id) {
            if(!confirm('Are you sure you want to delete this product?')) return;
            
            try {
                await fetch('/api/products/' + id, { method: 'DELETE' });
                showToast('Product deleted!', true);
                loadProducts();
            } catch(err) {
                console.error(err);
            }
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.background = isError ? '#d63031' : '#00b894';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function logoutAdmin() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
