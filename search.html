<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Bar</title>
    <style>
        body {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .search-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }

        .search-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 30px;
        }

        .back-button {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            color: #475569;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: #e2e8f0;
            border-color: #cbd5e1;
            transform: translateX(-2px);
        }

        .back-button:active {
            transform: translateX(0);
        }

        .back-icon {
            width: 18px;
            height: 18px;
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 18px 60px 18px 50px;
            font-size: 18px;
            border: 3px solid #e2e8f0;
            border-radius: 15px;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: #94a3b8;
        }

        .search-button {
            position: absolute;
            right: 8px;
            top: 8px;
            bottom: 8px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-button:hover {
            background: #5a67d8;
            transform: translateY(-1px);
        }

        .search-button:active {
            transform: translateY(0);
        }

        .suggestions {
            margin-top: 20px;
        }

        .suggestions-title {
            font-size: 14px;
            color: #64748b;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .suggestion-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .suggestion-tag {
            background: #f1f5f9;
            color: #475569;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .suggestion-tag:hover {
            background: #e2e8f0;
            transform: translateY(-1px);
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .search-container {
                padding: 30px 20px;
            }

            .search-title {
                font-size: 2rem;
            }

            .back-button {
                padding: 10px 16px;
                font-size: 14px;
            }

            .back-icon {
                width: 16px;
                height: 16px;
            }

            .search-input {
                padding: 16px 50px 16px 45px;
                font-size: 16px;
            }

            .search-button {
                padding: 0 16px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .search-input {
                padding: 14px 45px 14px 40px;
            }

            .search-button {
                padding: 0 12px;
                font-size: 13px;
            }

            .suggestion-tags {
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div class="search-container">
        <div style="display: flex; align-items: center; margin-bottom: 30px;">
            <a href="index.html" class="back-button" style="text-decoration: none;">
                <svg class="back-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                click to go Back
            </a>
            <h1 class="search-title" style="margin: 0; flex: 1; text-align: center;">Search</h1>
        </div>

        <div class="search-wrapper">
            <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>

            <input type="text" class="search-input" placeholder="Search for anything...">

            <button class="search-button">Search</button>
        </div>

        <div class="suggestions">
            <p class="suggestions-title">Popular searches:</p>
            <div class="suggestion-tags">
                <button class="suggestion-tag">Nike</button>
                <button class="suggestion-tag">Adidas</button>
                <button class="suggestion-tag">Puma</button>
                <button class="suggestion-tag">Yonex</button>
                <button class="suggestion-tag">Reebok</button>
                <button class="suggestion-tag">New Balance</button>
                <button class="suggestion-tag">Cosco</button>
                <button class="suggestion-tag">Asics</button>
                <button class="suggestion-tag">Wilson</button>
            </div>
        </div>
    </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.querySelector('.search-input');
            const searchBtn = document.querySelector('.search-button');
            const suggestionTags = document.querySelectorAll('.suggestion-tag');

            function performSearch(query) {
                if (!query) return;
                query = query.toLowerCase().trim();

                // Map of known brand pages
                const brandPages = {
                    'nike': 'nike.html',
                    'adidas': 'adidas.html',
                    'puma': 'puma.html',
                    'yonex': 'yonex.html',
                    'reebok': 'ree.html',
                    'new balance': 'nb.html',
                    'cosco': 'cosco.html',
                    'asics': 'asics.html',
                    'wilson': 'wilson.html'
                };

                if (brandPages[query]) {
                    window.location.href = brandPages[query];
                } else if (query === 'shoes' || query === 'kids') {
                    window.location.href = 'index.html#Exclusive Items';
                } else {
                    alert(`No results found for "${query}". Try searching for brands like Nike, Adidas, Puma, etc.`);
                }
            }

            searchBtn.addEventListener('click', () => performSearch(searchInput.value));

            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    performSearch(searchInput.value);
                }
            });

            suggestionTags.forEach(tag => {
                tag.addEventListener('click', () => {
                    searchInput.value = tag.innerText;
                    performSearch(tag.innerText);
                });
            });
        });
    </script>
    <script src="app.js"></script>
</body>

</html>
